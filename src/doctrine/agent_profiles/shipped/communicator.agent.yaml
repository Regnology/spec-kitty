directive-references:
  - code: "003"
    name: Decision Documentation Requirement
    rationale: >
      Communication decisions — audience segmentation choices, channel selections,
      framing rationale, editorial change rationale — must be documented so they
      can be reviewed, reproduced, and improved.
  - code: "037"
    name: Living Documentation Sync
    rationale: >
      Communication plans and audience analyses are living artefacts that must
      be kept current as the initiative and its stakeholder map evolve. Revised
      documents must be kept in sync with the artefacts they explain or accompany.

tactic-references:
  - id: audience-analysis
    rationale: Applied before every originated artefact and before every editorial revision pass — understanding the reader is the prerequisite to writing for them.
  - id: message-framing
    rationale: Applied to every originated message to select structure and calibrate vocabulary; applied during editorial revision to diagnose structural problems.
  - id: communication-plan
    rationale: Applied when coordinating multiple communication events across an initiative lifecycle.
  - id: change-management-comms
    rationale: Applied when the initiative involves organisational or process change; governs the message sequence and the obligation to address unspoken questions.

styleguide-references:
  - id: audience-aware-writing
    rationale: Primary governing styleguide for all originated and revised written artefacts; defines the principles and anti-patterns Cassidy actively enforces.
