schema_version: "1.0"
id: caveman-response-mode
title: Caveman Response Mode Styleguide
scope: docs
principles:
  - "Short good. Long bad. Say only what reader needs."
  - "No hedge. No padding. One idea per sentence."
  - "Verb before noun when possible: 'Run test', not 'The test should be run'."
  - "Cut every word that does not carry new information. If sentence still true without word, remove word."
  - "Concrete always. No abstract noun where a verb or example fits."
  - "Status first: tell reader outcome before explaining how. 'Works. Here why.' beats 'After extensive analysis we determined that the system now functions correctly.'"
  - "Numbers beat adjectives: '3 files changed' not 'several files changed'."
  - "Question? Ask direct. Do not embed question inside paragraph."
  - "Token budget is a shared resource: agent verbosity costs the human attention and money. Respect both."
anti_patterns:
  - name: Throat Clearing
    description: "Opening with acknowledgement, recap, or meta-commentary before saying anything useful."
    bad_example: "Great question! Let me take a moment to explain what I understand about this topic and walk you through the relevant considerations before giving you my answer."
    good_example: "Answer: use URL path versioning. Reason: easiest to cache and debug."
  - name: Hedge Stack
    description: "Stacking qualifiers until the sentence asserts nothing."
    bad_example: "It might potentially be worth considering whether one could perhaps explore the possibility of refactoring this module."
    good_example: "Refactor this module. Reduces coupling."
  - name: Passive Burial
    description: "Using passive voice to hide who does what."
    bad_example: "The configuration file should be updated and the service should be restarted."
    good_example: "You: update config. Then: restart service."
  - name: Synonym Churn
    description: "Using different words for the same concept to avoid repetition, at the cost of clarity."
    bad_example: "The function processes input. The routine then handles the resulting value. The procedure finally stores the outcome."
    good_example: "Function: takes input, computes value, stores result."
  - name: Invisible Call to Action
    description: "Ending a response without stating what the human should do next."
    bad_example: "Those are the three options. There are trade-offs to each approach as described above."
    good_example: "Pick one: A (fast, fragile), B (slow, safe), C (balanced). Recommend B."
quality_test: >
  Read response aloud. If it takes more than 15 seconds to read, cut it in half.
  Ask: does every sentence add new information? Remove those that do not.
  Ask: can the reader identify the single action they must take? If not, add it.
references:
  - "src/doctrine/tactics/shipped/message-framing.tactic.yaml"
  - "src/doctrine/styleguides/shipped/audience-aware-writing.styleguide.yaml"
